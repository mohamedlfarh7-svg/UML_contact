<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulation - GoMoney</title>
<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Roboto', sans-serif;
}

body {
    background:#f4f7fb;
    color:#333;
    line-height:1.6;
    scroll-behavior:smooth;
}

header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 50px;
    background: linear-gradient(90deg, #044069, #03406b);
    color:white;
    position:fixed;
    width:100%;
    top:0;
    z-index:1000;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

header h1 {
    font-size:28px;
    font-weight:700;
}

.nav-links {
    display:flex;
    align-items:center;
    gap:20px;
}

.nav-links ul {
    display:flex;
    gap:20px;
    list-style:none;
}

.nav-links ul li a {
    color:white;
    text-decoration:none;
    padding:5px 10px;
    border-radius:8px;
    transition:0.3s;
    font-weight:600;
}

.nav-links ul li a:hover {
    background: rgba(255,255,255,0.1);
    color:#34c2c7;
}

.menu {
    display:none;
    font-size:30px;
    background:none;
    border:none;
    color:white;
    cursor:pointer;
}

.close-btn {
    font-size:30px;
    background:none;
    border:none;
    color:white;
    cursor:pointer;
    position:absolute;
    top:20px;
    right:20px;
}

.mobile-menu {
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:30px;
    position:fixed;
    top:0;
    left:0;
    height:100vh;
    width:100%;
    background:rgba(4,64,105,0.95);
    transform:translateY(-100%);
    transition:transform 0.5s ease;
    z-index:999;
}

.mobile-menu.show {
    transform:translateY(0);
}

.mobile-menu li a {
    font-size:24px;
    color:white;
}

section {
    padding:120px 20px 50px 20px;
    max-width:800px;
    margin:0 auto;
}

h2 {
    margin-bottom:20px;
    font-size:32px;
    color:#044069;
    text-align:center;
}

form {
    display:flex;
    flex-direction:column;
    gap:15px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

form label {
    font-weight:600;
}

form input,
form select {
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

form button {
    background:#34c2c7;
    color:white;
    border:none;
    padding:15px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

form button:hover {
    background:#0288d1;
    transform:scale(1.05);
}

.Return {
    text-align:center;
    margin:30px 0;
}

.Return button {
    padding:12px 25px;
    border-radius:12px;
    border:none;
    background:#03406b;
    color:white;
    cursor:pointer;
}

.Return button a {
    color:white;
    text-decoration:none;
}

footer {
    text-align:center;
    padding:30px 20px;
    background:linear-gradient(90deg, #03406b, #044069);
    color:white;
    margin-top:50px;
}

@media(max-width:768px){
  .menu {
      display:block;
  }
  .nav-links ul.desktop-menu {
      display:none;
  }
}

</style>
</head>
<body>

<header>
  <h1 id="logo">GoMoney</h1>
  <div class="nav-links">
    <button class="menu" id="menu-btn">☰</button>
    <ul class="mobile-menu" id="menu">
      <li class="close-li"><button class="close-btn" id="close-btn">✖</button></li>
      <li><a href="index.html">Accueil</a></li>
      <li><a href="simulation.html">Simulation</a></li>
      <li><a href="contct.html">Contact</a></li>
      <li><a href="Aide.html">Aide / FAQ</a></li>
    </ul>
    <ul class="desktop-menu">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="simulation.html">Simulation</a></li>
      <li><a href="contct.html">Contact</a></li>
      <li><a href="Aide.html">Aide / FAQ</a></li>
    </ul>
  </div>
</header>

<section id="simulation">
  <h2>Simulation de Prêt</h2>
  <form id="loanForm">
    <label for="salary">Salaire Mensuel (MAD):</label>
    <input type="number" id="salary" name="salary" required>

    <label for="loanType">Type de Prêt:</label>
    <select id="loanType" name="loanType" required>
      <option value="">-- Choisissez un type --</option>
      <option value="Personnel">Prêt Personnel</option>
      <option value="Maison">Prêt Maison</option>
      <option value="Appartement">Prêt Appartement</option>
      <option value="Terrain">Terrain</option>
      <option value="Petite entreprise">Petite entreprise</option>
    </select>

    <label for="loanAmount">Montant du Prêt (MAD):</label>
    <input type="number" id="loanAmount" name="loanAmount" required>

    <label for="loanTerm">Durée du Prêt (années):</label>
    <input type="number" id="loanTerm" name="loanTerm" required>

    <button type="submit">Calculer les Mensualités</button>
  </form>
</section>

<footer>
  <p>© 2024 GoMoney. Tous droits réservés.</p>
</footer>

<script>
const menuBtn = document.getElementById('menu-btn');
const closeBtn = document.getElementById('close-btn');
const menu = document.getElementById('menu');

menuBtn.addEventListener('click', ()=>{ menu.classList.add('show'); });
closeBtn.addEventListener('click', ()=>{ menu.classList.remove('show'); });

document.getElementById("loanForm").addEventListener("submit", function(event){
  event.preventDefault();

  const salaire = parseFloat(document.getElementById('salary').value);
  const typePret = document.getElementById('loanType').value;
  const montantPret = parseFloat(document.getElementById('loanAmount').value);
  const dureePret = parseFloat(document.getElementById('loanTerm').value);

  let tauxInteret;
  if(typePret==='Personnel') tauxInteret=0.09;
  else if(typePret==='Maison') tauxInteret=0.04;
  else if(typePret==='Appartement') tauxInteret=0.045;
  else if(typePret==='Terrain') tauxInteret=0.055;
  else if(typePret==='Petite entreprise') tauxInteret=0.07;
  else return alert("Veuillez choisir un type de prêt valide.");

  const mensualite = (montantPret*(tauxInteret/12)) / (1 - Math.pow(1 + tauxInteret/12, -dureePret*12));
  const decision = mensualite < salaire*0.4 ? "accepté" : "refusé";

  localStorage.setItem("typePret", typePret);
  localStorage.setItem("dureePret", dureePret);
  localStorage.setItem("tauxInteret", tauxInteret);
  localStorage.setItem("mensualite", mensualite);
  localStorage.setItem("decision", decision);
  localStorage.setItem("salaire", salaire);

  window.location.href="result.html";
});
</script>
</body>
</html>
